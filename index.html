<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Fixes the small mobile thumbnail/zoom issue -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Browser Tab Title -->
    <title>Model Exam Portal</title>

    <!-- WhatsApp & Social Media Link Preview Customization -->
    <meta property="og:title" content="Model Exam Portal" />
    <meta property="og:description" content="Access your online model examination and practice tests here." />
    <meta property="og:url" content="https://modelexamitichackai.github.io/modelexam/" />
    <meta property="og:type" content="website" />
    <!-- Optional: If you ever upload a logo image to github, put its link below -->
    <meta property="og:image" content="https://modelexamitichackai.github.io/modelexam/logo.png" />

    <!-- CSS to force the app to take up 100% of the mobile screen cleanly -->
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        iframe {
            width: 100%;
            height: 100%;
            flex-grow: 1;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your Google Apps Script App embedded dynamically -->
        <iframe src="https://script.google.com/macros/s/AKfycby9xA_KCAe_HjpfZH9nYocsw7xgB381mDqRDZEB9kIPRlHNMxzJA2gUaBYTcOiL_O7w/exec" 
                allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment;精神; autoplay;">
        </iframe>
    </div>

</body>
</html>
